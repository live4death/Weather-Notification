<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.syncfusion.com/ej2/25.1.35/material.css" rel="stylesheet">
    <script src="https://cdn.syncfusion.com/ej2/25.1.35/dist/ej2.min.js"></script></head>
<body>
    <div class="weather-card">
        <div class="top-row">
            <div class="titles">
                <h1>Weather</h1>
                <h1 id="city-name"></h1>
                <h2 id="condition"></h2>
            </div>
            <div class="badges">
                <div class="city-search">
                    <input list="cities" class="badge" id="city-input" placeholder="Search your city" aria-label="City">
                    <a href="#" class="search-icon-abs"><i class="fas fa-magnifying-glass"></i></a>
                    <datalist id="cities">
                    </datalist>
                </div>
                <div class="time-picker">
                    <input type="text" id="time-input" class="badge" placeholder="Select time" readonly>
                    <div class="time-dropdown" id="time-dropdown"></div>
                </div>            
            </div>
        </div>

<div class="weather-widget">
    <a class="day-link" href="#">
    <div class="day-column active first" id="day1">
        <div class="header">
            <div class="day-name">MA</div>
            <div class="date">Astăzi</div>
        </div>
        <div class="weather-box">
            ⛅
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">1 °C</div>
            <div class="stat-row">↙ 6 km/h</div>
        </div>
    </div>
    </a>

    <a class="day-link" href="#">
    <div class="day-column" id="day2">
        <div class="header">
            <div class="day-name">MI</div>
            <div class="date">Mâine</div>
        </div>
        <div class="weather-box">
            🌤️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">2 °C</div>
            <div class="stat-row">⬅ 5 km/h</div>
        </div>
    </div>
    </a>

    <a class="day-link" href="#">
    <div class="day-column" id="day3">
        <div class="header">
            <div class="day-name">JO</div>
            <div class="date">5/3</div>
        </div>
        <div class="weather-box">
            ⛅
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">16 °C</div>
            <div class="temp-badge temp-low">4 °C</div>
            <div class="stat-row">↘ 7 km/h</div>

        </div>
    </div>
    </a>

    <a class="day-link" href="#">
    <div class="day-column" id="day4">
        <div class="header">
            <div class="day-name">VI</div>
            <div class="date">6/3</div>
        </div>
        <div class="weather-box">
            ☀️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">3 °C</div>
            <div class="stat-row">⬇ 11 km/h</div>

        </div>
    </div>
    </a>

    <a class="day-link" href="#">
    <div class="day-column last" id="day5">
        <div class="header">
            <div class="day-name">SB</div>
            <div class="date">7/3</div>
        </div>
        <div class="weather-box">
            ☀️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">2 °C</div>
        </div>
    </div>
    </a>
</div>


        <div class="bottom-row">
            <div class="icon" id="main-emoji">
                ⛅
            </div>
            <div class="temperature" id="temperature-now">
            </div>
            <div class="details">
                <p id="feeling">Feels Like: °C</p>
                <p id="wind">Wind:  km/h</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
